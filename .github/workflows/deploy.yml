name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'Dockerfile'
      - 'templates/**'
      - 'tests/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Run tests
        run: python -m pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Enforce Cloud Run budget lock
        run: |
          if ! lock="$(gcloud secrets versions access latest --secret=cloud-run-budget-lock 2>/dev/null)"; then
            if gcloud secrets describe cloud-run-budget-lock >/dev/null 2>&1; then
              echo '::error::Cloud Run budget lock exists but could not be read.'
              exit 1
            fi
            echo '::warning::Cloud Run budget lock is not configured yet.'
            lock="open"
          fi
          if [[ "$lock" == locked:* ]]; then
            echo '::error::Cloud Run deployments are locked because monthly Cloud Run spend reached the $10 hard limit.'
            exit 1
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy capstudy \
            --source . \
            --region us-central1 \
            --update-env-vars=LLM_PRIVACY_PROFILE=education_deidentified \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=5 \
            --cpu-throttling \
            --quiet
